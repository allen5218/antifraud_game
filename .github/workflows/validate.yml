name: PR validate
# 在 PR 上驗證 deploy/compose.prod.yml + 實際建置 backend/frontend image(不推)，作為
# Renovate auto-merge 的合併閘門。刻意不加 paths 過濾：branch protection 的 required check
# 必須在「每個」PR 上都回報，否則 compose-only / workflow-only 的 PR 會因沒有檢查結果而永遠
# 卡在 auto-merge。
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      # compose.prod.yml 用 env_file: .env(fresh checkout 無此檔)——由 .env.example 建一份
      # 佔位 .env 讓 config 可解析;--project-directory . 讓 env_file/volumes 從 repo 根解析。
      - name: Validate deploy/compose.prod.yml
        run: |
          cp .env.example .env
          docker compose -f deploy/compose.prod.yml --project-directory . config > /dev/null && echo "compose.prod config OK"

      # 實際建置（amd64、不推送）——抓得到 base image 等依賴更新造成的 build 破壞。
      # 重用 main 上 build.yml 的 GHA cache 以加速;arm64 仍由合併後的 build.yml 驗證。
      - name: Build backend (amd64, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=backend-linux-amd64
          cache-to: type=gha,mode=max,scope=pr-validate-backend

      - name: Build frontend (amd64, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: frontend/Dockerfile
          platforms: linux/amd64
          push: false
          build-args: VITE_API_URL=https://api.example.com
          cache-from: type=gha,scope=frontend-linux-amd64
          cache-to: type=gha,mode=max,scope=pr-validate-frontend
