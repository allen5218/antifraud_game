name: Test Backend

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  test-backend:
    runs-on: ubuntu-latest
    # H1 退役本機 db 後,CI 用 compose.ci.yml 疊層起一個自含 pgvector postgres;
    # runner 端(uv run pytest)以 localhost:5432 連 mapped port。
    env:
      PROJECT_NAME: ci
      DOCKER_IMAGE_BACKEND: backend
      DOCKER_IMAGE_FRONTEND: frontend
      DOMAIN: localhost
      FRONTEND_HOST: http://localhost:5173
      ENVIRONMENT: local
      SECRET_KEY: ci-not-for-production
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: changethis
      # test_recovery_password 需 emails_enabled=True(SMTP_HOST 由測試 patch;此處補 from-email)
      EMAILS_FROM_EMAIL: noreply@example.com
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changethis
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.10"
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      # compose.yml 有 env_file: .env(fresh checkout 無此檔)——建一個空的滿足 env_file
      - name: Provide placeholder .env
        run: touch .env
      - run: docker compose -f compose.yml -f compose.ci.yml down -v --remove-orphans
      - run: docker compose -f compose.yml -f compose.ci.yml up -d --wait db
      - name: Migrate DB
        run: uv run bash scripts/prestart.sh
        working-directory: backend
      - name: Run tests
        run: uv run bash scripts/tests-start.sh "Coverage for ${{ github.sha }}"
        working-directory: backend
      - run: docker compose -f compose.yml -f compose.ci.yml down -v --remove-orphans
      - name: Store coverage files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-html
          path: backend/htmlcov
          include-hidden-files: true
      - name: Coverage report
        run: uv run coverage report --fail-under=90
        working-directory: backend
